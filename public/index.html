<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <meta name="asset-version" content="__ASSET_VERSION__" />
  <title>Take 5</title>
  <script>
    window.__TAKE5_LOGO_DEMO__ = new URLSearchParams(location.search).has('logo');
  </script>
  <script>
    (function () {
      const v = document.querySelector('meta[name="asset-version"]').content;
      const demo = window.__TAKE5_LOGO_DEMO__;
      const cardsUrl = demo
        ? `/shared/cards-corporate.js?v=${v}`
        : `/shared/cards.js?v=${v}`;
      const im = document.createElement('script');
      im.type = 'importmap';
      im.textContent = JSON.stringify({
        imports: {
          '/shared/cards.js': cardsUrl,
          '/shared/constants.js': `/shared/constants.js?v=${v}`,
          '/shared/card-face-layout.js': `/shared/card-face-layout.js?v=${v}`,
          '/shared/sequence-claim.js': `/shared/sequence-claim.js?v=${v}`,
          '/shared/test-scenarios.js': `/shared/test-scenarios.js?v=${v}`,
        },
      });
      document.currentScript.after(im);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            board: '#0f172a',
            cell: '#1e293b',
          },
        },
      },
      safelist: [
        'grid', 'grid-cols-10', 'gap-1', 'aspect-square',
        'board-cell', 'bg-cell', 'card-face', 'card-face-board', 'card-face-hand',
        'suit-hearts', 'suit-diamonds', 'suit-clubs', 'suit-spades',
        'card-face-wild', 'card-face-wild-label', 'card-face-rank', 'card-face-suit',
        'card-face-plain', 'card-face-logo-mode', 'card-face-logo',
        'take5-board-grid', 'cell-highlight-flash', 'cell-highlight-remove-flash',
        'cell-highlight-team', 'cell-highlight-team-red', 'cell-highlight-team-blue', 'cell-highlight-team-green',
        'board-cell-chip', 'board-cell-chip-red', 'board-cell-chip-blue', 'board-cell-chip-green',
      ],
    };
  </script>
  <link rel="stylesheet" href="/css/styles.css?v=__ASSET_VERSION__" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
  <div id="app" class="min-h-screen"></div>
  <script type="module" src="/js/app.js?v=__ASSET_VERSION__"></script>
</body>
</html>
